name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      run: |
        SDKMGR=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
        yes | $SDKMGR --licenses || true
        $SDKMGR "platforms;android-35" "build-tools;35.0.0"
    - name: Build APK
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        wget -q https://services.gradle.org/distributions/gradle-8.13-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        /tmp/gradle-8.13/bin/gradle assembleDebug --no-daemon
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: AutoClicker-APK
        path: app/build/outputs/apk/debug/app-debug.apk
