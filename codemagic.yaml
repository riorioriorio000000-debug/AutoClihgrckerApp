workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Setup Android SDK
        script: |
          SDKMGR=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMGR --licenses || true
          $SDKMGR "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Build APK
        script: |
          wget -q https://services.gradle.org/distributions/gradle-8.13-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.13/bin/gradle assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/**/*.apk
